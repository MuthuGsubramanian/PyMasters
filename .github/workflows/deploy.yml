name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  test:
    name: Backend tests (pre-deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: pytest
        working-directory: backend
        env:
          JWT_SECRET: ci-gate-secret-long-enough-for-validation-abcdef
        run: python -m pytest -q --tb=short

      - name: live HTTP smoke (boots real uvicorn on temp DB)
        # Catches integration-level regressions like the passlib/bcrypt
        # /register 500 — the kind unit tests can miss because hash_pw works
        # locally but the deployed image's dep tree differs.
        working-directory: backend
        env:
          JWT_SECRET: ci-gate-secret-long-enough-for-validation-abcdef
        run: python tests/live_smoke_community.py

  deploy:
    name: Build + Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation — keyless)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:latest \
            .

      - name: Push Docker image
        run: |
          docker push --all-tags \
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pymasters \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --service-account pymasters-runtime@pymasters-app.iam.gserviceaccount.com \
            --set-env-vars "OLLAMA_MODEL=qwen3.5,DB_PATH=/app/data/pymasters.db,FROM_NAME=PyMasters,APP_BASE_URL=https://pymasters.net,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_BACKUP_HOST=smtp-relay.brevo.com,SMTP_BACKUP_PORT=587,VAATHIYAAR_PROVIDERS=ollama+gemini,GOOGLE_CLOUD_PROJECT=pymasters-app,GOOGLE_CLOUD_LOCATION=us-central1,FRONTEND_URL=https://pymasters.net,GITHUB_REDIRECT_URI=https://pymasters.net/api/auth/github/callback,LINKEDIN_REDIRECT_URI=https://pymasters.net/api/auth/linkedin/callback" \
            --set-secrets "OLLAMA_API_KEY=ollama-api-key:latest,SMTP_PASS=smtp-pass:latest,SMTP_USER=smtp-user:latest,FROM_EMAIL=smtp-user:latest,SMTP_BACKUP_USER=smtp-backup-user:latest,SMTP_BACKUP_PASS=smtp-backup-pass:latest,JWT_SECRET=jwt-secret:latest,EXPORT_TOKEN=export-token:latest,GITHUB_CLIENT_ID=GITHUB_CLIENT_ID:latest,GITHUB_CLIENT_SECRET=GITHUB_CLIENT_SECRET:latest,LINKEDIN_CLIENT_ID=LINKEDIN_CLIENT_ID:latest,LINKEDIN_CLIENT_SECRET=LINKEDIN_CLIENT_SECRET:latest" \
            --memory 1Gi \
            --cpu 1 \
            --no-cpu-throttling \
            --concurrency 80 \
            --min-instances 1 \
            --max-instances 1

      - name: Show deployment URL
        run: |
          gcloud run services describe pymasters \
            --region us-central1 \
            --format 'value(status.url)'
