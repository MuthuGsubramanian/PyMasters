name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:latest \
            .

      - name: Push Docker image
        run: |
          docker push --all-tags \
            us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pymasters \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloud-run-source-deploy/pymasters:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --set-env-vars "OLLAMA_API_KEY=${{ secrets.OLLAMA_API_KEY }},OLLAMA_API_URL=https://api.ollama.com/v1,OLLAMA_MODEL=qwen3.5,DB_PATH=/app/data/pymasters.duckdb" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3

      - name: Show deployment URL
        run: |
          gcloud run services describe pymasters \
            --region us-central1 \
            --format 'value(status.url)'
