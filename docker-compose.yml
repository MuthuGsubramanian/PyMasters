version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/pymasters.db
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-208d52f4a68a4c00aa4518fac8d995c6.oV--ePuqKn4DSs2T7tBW0KE7}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5}

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
