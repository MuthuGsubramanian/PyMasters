<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fTriGrad" x1="16" y1="0" x2="16" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1145"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <radialGradient id="fCoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Inverted triangle housing -->
  <polygon
    points="16,1.5 30.5,29.5 1.5,29.5"
    fill="url(#fTriGrad)"
    stroke="#7c3aed"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Reactor core outer ring -->
  <circle
    cx="16" cy="17" r="6.5"
    fill="#0d0a2e"
    stroke="#7c3aed"
    stroke-width="1"
  />

  <!-- Core glow -->
  <circle
    cx="16" cy="17" r="4"
    fill="#7c3aed"
    fill-opacity="0.35"
    filter="url(#fGlow)"
  />

  <!-- Bright center -->
  <circle
    cx="16" cy="17" r="1.2"
    fill="#c4b5fd"
    filter="url(#fGlow)"
  />

  <!-- "Py" text -->
  <text
    x="16" y="21"
    font-family="'Inter', system-ui, sans-serif"
    font-size="7.5"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="auto"
  >Py</text>

  <!-- Vertex accent dots -->
  <circle cx="16" cy="1.5" r="1" fill="#7c3aed" opacity="0.9"/>
  <circle cx="30.5" cy="29.5" r="1" fill="#7c3aed" opacity="0.9"/>
  <circle cx="1.5" cy="29.5" r="1" fill="#7c3aed" opacity="0.9"/>
</svg>
